  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./minio_data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 10


  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.3.3
    command: ["milvus", "run", "standalone"]
    
    environment:
      ETCD_ENDPOINTS: "etcd:2379"
      MINIO_ADDRESS: "minio:9000"
      COMMON_CLEANSTALEINFO: "true"
      COMMON_IGNORENODEIDCHECK: "true"
      COMMON_STARTUPTIMEOUT: "120"
      COMMON_HEARTBEATINTERVAL: "3000"
      COMMON_CLUSTERNOTREADYEXIT: "false"
      COMMON_RETENTIONONSTARTUP: "false"
    volumes:
      - ./milvus_data:/var/lib/milvus
      
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/metrics"]
      interval: 10s
      timeout: 10s
      retries: 20

